name: Lambda Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Compile TypeScript
        working-directory: src
        run: npx tsc

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: src/dist/

  deploy:
    name: Deploy (${{ matrix.function }})
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      matrix:
        include:
          # Capture handlers — all share the same code package
          - function: capture
            handler_dir: functions/capture
          - function: capture-validate
            handler_dir: functions/capture
          - function: capture-classify
            handler_dir: functions/capture
          - function: capture-persist
            handler_dir: functions/capture
          - function: capture-edges
            handler_dir: functions/capture
          # Search Lambda
          - function: search
            handler_dir: functions/search
          # Graph Lambda
          - function: graph
            handler_dir: functions/graph
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production dependencies
        working-directory: src
        run: npm ci --omit=dev

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: src/dist/

      - name: Package Lambda
        run: |
          mkdir -p package
          # Preserve full directory structure so relative imports work
          # e.g. functions/capture/steps/validate.js imports ../../../shared/
          cp -r src/dist/${{ matrix.handler_dir }} package/${{ matrix.handler_dir }}
          mkdir -p package/shared
          cp -r src/dist/shared/* package/shared/
          cp -r src/node_modules package/
          cd package && zip -r ../deploy.zip .

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name ssb-dev-${{ matrix.function }} \
            --zip-file fileb://deploy.zip
